<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍕 Napoli Pizza</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E; --red-dark: #9B0B22;
    --cream: #FDF6EC; --dark: #1A1007;
    --gold: #D4A017; --green: #2D6A4F;
    --gray: #6B6B6B; --light: #F5EFE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream); color: var(--dark); min-height: 100vh;
  }
  body.ar { font-family: 'Noto Sans Arabic', 'DM Sans', sans-serif; }

  /* NAV — two-row header */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--dark);
    display: flex; flex-direction: column;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    overflow: visible;
  }

  /* Row 1: logo + page tabs + cart */
  .nav-row1 {
    display: flex; align-items: center;
    padding: 0 1.5rem; height: 52px; gap: 0.75rem;
  }
  .logo {
    font-family: 'Playfair Display', serif; font-size: 1.4rem;
    color: var(--cream); letter-spacing: 1px; white-space: nowrap; flex-shrink: 0;
  }
  .logo span { color: var(--red); }
  .nav-spacer { flex: 1; }
  .nav-center { display: flex; gap: 0.25rem; flex-shrink: 0; }
  .nav-tab {
    padding: 0.4rem 0.85rem; border: none; cursor: pointer;
    border-radius: 6px; font-family: inherit; font-size: 0.8rem; font-weight: 500;
    transition: all 0.2s; background: transparent; color: #aaa; white-space: nowrap;
  }
  .nav-tab.active { background: var(--red); color: white; }
  .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.1); color: white; }

  /* CART BUTTON + DROPDOWN */
  .cart-wrap { position: relative; flex-shrink: 0; }
  .cart-btn {
    background: var(--red); color: white; border: none; cursor: pointer;
    padding: 0.4rem 0.9rem; border-radius: 8px; font-family: inherit; font-weight: 500;
    display: flex; align-items: center; gap: 0.45rem;
    transition: background 0.2s; white-space: nowrap; font-size: 0.85rem;
  }
  .cart-btn:hover { background: var(--red-dark); }
  .cart-count {
    background: var(--gold); color: var(--dark); border-radius: 50%;
    width: 20px; height: 20px; font-size: 0.72rem;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }

  /* Row 2: lang + currency centred */
  .nav-row2 {
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    padding: 0.35rem 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.18);
  }


  /* PHONE IN NAV */
  .nav-phone {
    font-size: 0.9rem; font-weight: 700;
    color: var(--gold); letter-spacing: 1px;
    white-space: nowrap;
  }

  /* NAV ROW 3 */
  .nav-row3 {
    display: flex; align-items: center; justify-content: center;
    padding: 0.3rem 1.5rem 0.4rem;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .nav-phone {
    font-size: 1rem; font-weight: 700;
    color: var(--gold); letter-spacing: 1.5px;
  }

  /* LANG SWITCHER */
  .lang-switcher { display: flex; gap: 0.2rem; }
  .lang-btn {
    padding: 0.22rem 0.55rem; border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700;
    background: transparent; color: #aaa; transition: all 0.2s; font-family: inherit;
  }
  .lang-btn.active { border-color: var(--gold); color: var(--gold); }
  .lang-btn:hover:not(.active) { border-color: #fff; color: white; }

  /* CURRENCY SWITCHER */
  .nav-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .currency-switcher { display: flex; gap: 0.2rem; }
  .cur-btn {
    padding: 0.22rem 0.55rem; border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700;
    background: transparent; color: #aaa; transition: all 0.2s; font-family: inherit;
  }
  .cur-btn.active { border-color: #4ade80; color: #4ade80; }
  .cur-btn:hover:not(.active) { border-color: #fff; color: white; }

  .page { display: none; }
  .page.active { display: block; }

  .hero::after {
    content: '';
    display: block;
    padding-bottom: 66.67%; /* 2/3 ratio = 1024/1536 */
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* CATEGORY BAR */
  .category-bar {
    display: flex; gap: 0.5rem; padding: 1.5rem 2rem 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .cat-btn {
    white-space: nowrap; padding: 0.5rem 1.2rem;
    border: 2px solid transparent; border-radius: 99px; cursor: pointer;
    font-family: inherit; font-weight: 500; font-size: 0.9rem;
    transition: all 0.2s; background: var(--light); color: var(--gray);
  }
  .cat-btn.active { background: var(--red); color: white; border-color: var(--red); }
  .cat-btn:hover:not(.active) { border-color: var(--red); color: var(--red); }

  /* MENU */
  .menu-section { padding: 1.5rem 2rem 3rem; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }

  .card {
    background: white; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    transition: transform 0.25s, box-shadow 0.25s; display: flex; flex-direction: column;
  }

// ===== CURRENCY =====
const CURRENCIES = {
  rub: { symbol: '₽', rate: 1,      decimals: 0, before: false },
  usd: { symbol: '$', rate: 0.011,  decimals: 2, before: true  },
  egp: { symbol: 'ج.م', rate: 0.55, decimals: 2, before: false },
};
let currency = 'rub';

function formatPrice(rubPrice) {
  const cur = CURRENCIES[currency];
  const val = rubPrice * cur.rate;
  const formatted = val.toFixed(cur.decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return cur.before ? cur.symbol + formatted : formatted + ' ' + cur.symbol;
}

function setCurrency(c) {
  currency = c;
  document.querySelectorAll('.cur-btn').forEach((b, i) => {
    b.classList.toggle('active', ['rub','usd','egp'][i] === c);
  });
  renderMenu(currentCat);
  updateCartUI();
  if (document.getElementById('page-admin').classList.contains('active')) renderAdmin();
}

let lang = 'ru';

function t(key) { return (LANGS[lang] && LANGS[lang][key]) || LANGS.ru[key] || key; }

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.body.classList.toggle('ar', l === 'ar');

  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['ru','en','ar'][i] === l);
  });

  applyTranslations();
  renderMenu(currentCat);
  renderCatBar();
  updateCartUI();
  if (document.getElementById('page-admin').classList.contains('active')) renderAdmin();
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-ph'));
  });
  // Payment options
  const sel = document.getElementById('fPayment');
  if (sel) {
    const opts = sel.querySelectorAll('option');
    ['pay_card','pay_cash','pay_sbp'].forEach((k,i) => { if(opts[i]) opts[i].textContent = t(k); });
  }
}

// ===== MENU =====
function renderMenu(cat='all') {
  currentCat = cat;
  const grid = document.getElementById('menuGrid');
  const items = cat === 'all' ? MENU_DATA : MENU_DATA.filter(i => i.cat === cat);

  grid.innerHTML = items.map(item => {
    const sizes = getSizes(item);
    const sKey = 'sel_'+item.id;
    if (sizes && !selectedSizes[sKey]) {
      const sizeKeys = Object.keys(sizes);
      selectedSizes[sKey] = sizeKeys[1] || sizeKeys[0];
    }

    const sizesHTML = sizes ? `
      <div class="size-sel">
        ${Object.keys(sizes).map(s =>
          `<div class="size-opt ${selectedSizes[sKey]===s?'selected':''}" onclick="selectSize(${item.id},'${s}',this)">${s}</div>`
        ).join('')}
      </div>` : '';

    const price = sizes ? (sizes[selectedSizes[sKey]] || item.price) : item.price;
    const badgeText = item.badgeKey ? t(item.badgeKey) : '';

    return `
      <div class="card" id="card-${item.id}">
        <div class="card-img">
          ${item.emoji}
          ${badgeText ? `<div class="card-badge">${badgeText}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${item.names[lang] || item.names.ru}</div>
          <div class="card-desc">${item.descs[lang] || item.descs.ru}</div>
          ${sizesHTML}
          <div class="card-footer">
            <div class="card-price" id="price-${item.id}">${t('from')} ${formatPrice(price)}</div>
            <button class="add-btn" onclick="addToCart(${item.id})" title="${t('add')}">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function selectSize(id, size, el) {
  selectedSizes['sel_'+id] = size;
  el.parentElement.querySelectorAll('.size-opt').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  const item = MENU_DATA.find(i => i.id === id);
  const sizes = getSizes(item);
  document.getElementById('price-'+id).textContent = t('from') + ' ' + formatPrice(sizes[size]);
}

function filterCat(cat, el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMenu(cat);
}

// ===== CART =====
function addToCart(id) {
  const item = MENU_DATA.find(i => i.id === id);
  const sKey = 'sel_'+id;
  const sizes = getSizes(item);
  const size = sizes ? selectedSizes[sKey] : null;
  const price = sizes ? sizes[size] : item.price;
  const key = id + '_' + (size || 'default');
  const existing = cart.find(c => c.key === key);
  if (existing) existing.qty++;
  else cart.push({ key, id, name: item.names[lang]||item.names.ru, emoji: item.emoji, size, price, qty:1, itemRef: item });
  updateCartUI();
  showToast(`${item.emoji} ${item.names[lang]||item.names.ru} ${t('toast_added')}`);
}

function updateCartUI() {
  // Update names for current lang
  cart.forEach(c => {
    const item = MENU_DATA.find(i => i.id === c.id);
    if (item) c.name = item.names[lang] || item.names.ru;
  });

  const total = cart.reduce((s,c) => s + c.price*c.qty, 0);
  const count = cart.reduce((s,c) => s + c.qty, 0);
  document.getElementById('cartCount').textContent = count;

  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');

  if (!cart.length) {
    itemsEl.innerHTML = `<div class="empty-cart"><span class="emoji">🛒</span>${t('cart_empty')}</div>`;
    footerEl.style.display = 'none';
    return;
  }
  footerEl.style.display = 'block';
  document.getElementById('cartTotal').textContent = formatPrice(total);
  document.querySelector('.cart-total span').textContent = t('cart_total');
  document.querySelector('.checkout-btn').textContent = t('cart_checkout');

  itemsEl.innerHTML = cart.map((c,i) => `
    <div class="cart-item">
      <div class="ci-emoji">${c.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}${c.size ? ' ('+c.size+')':''}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-val">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <div class="ci-price">${formatPrice(c.price*c.qty)}</div>
    </div>`).join('');
}

function changeQty(i, delta) {
  cart[i].qty += delta;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateCartUI();
}

function toggleCart() {
  document.getElementById('cartDropdown').classList.toggle('open');
  document.getElementById('cartBackdrop').classList.toggle('open');
}




function goCheckout() {
  if (!cart.length) return;
  document.getElementById('cartDropdown').classList.remove('open');
  document.getElementById('cartBackdrop').classList.remove('open');
  renderCheckout();
  showPage('checkout');
}

function renderCheckout() {
  const total = cart.reduce((s,c) => s + c.price*c.qty, 0);
  document.getElementById('checkoutItems').innerHTML = cart.map(c =>
    `<div class="os-line"><span>${c.emoji} ${c.name}${c.size?' ('+c.size+')':''} × ${c.qty}</span><span>${formatPrice(c.price*c.qty)}</span></div>`
  ).join('');
  document.getElementById('checkoutTotal').textContent = formatPrice(total);
}

function selectDelivery(type, el) {
  deliveryType = type;
  document.querySelectorAll('.del-opt').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('addressGroup').style.display = type === 'delivery' ? 'block' : 'none';
}

function placeOrder() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const address = deliveryType === 'delivery' ? document.getElementById('fAddress').value.trim() : '';
  if (!name || !phone) { showToast(t('err_name')); return; }
  if (deliveryType === 'delivery' && !address) { showToast(t('err_address')); return; }

  const num = '#' + (++orderCounter);
  const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
  adminOrders.unshift({
    id: num, name, time: 'ago_now', status: 'new',
    items: cart.map(c => c.name + (c.size?' '+c.size[0]:'') + (c.qty>1?' x'+c.qty:'')).join(', '),
    total: String(total),
  });
  cart = [];
  updateCartUI();
  showOrderPopup(num);
}

function showOrderPopup(num) {
  document.getElementById('popupTitle').textContent = t('popup_title');
  document.getElementById('popupOrderNum').textContent = t('order_word') + ' ' + num;
  const payEl = document.getElementById('popupPayment');
  const payText = t('popup_payment');
  if (payText) { payEl.textContent = payText; payEl.style.display = 'block'; }
  else { payEl.style.display = 'none'; }
  document.getElementById('popupSms').textContent = t('popup_sms');
  document.getElementById('popupCloseBtn').textContent = t('popup_close');
  document.getElementById('orderPopup').classList.add('show');
}

function closeOrderPopup() {
  document.getElementById('orderPopup').classList.remove('show');
  showPage('menu');
}

// ===== ADMIN =====
function renderAdmin() {
  const newC = adminOrders.filter(o=>o.status==='new').length;
  const cookC = adminOrders.filter(o=>o.status==='cooking').length;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">${t('stat_new')}</div><div class="stat-val red">${newC}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_cooking')}</div><div class="stat-val" style="color:#1E40AF">${cookC}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_total')}</div><div class="stat-val">${adminOrders.length}</div></div>
    <div class="stat-card"><div class="stat-label">${t('stat_revenue')}</div><div class="stat-val green">${formatPrice(adminOrders.filter(o=>o.status!=='delivered').reduce((s,o)=>s+(parseInt(o.total)||0),0))}</div></div>
  `;

  document.getElementById('filterTabs').innerHTML = ['all','new','cooking','ready'].map(f =>
    `<button class="filter-tab ${adminFilter===f?'active':''}" onclick="filterOrders('${f}',this)">${t('filter_'+f)}</button>`
  ).join('');

  renderOrdersTable();
}

function renderOrdersTable() {
  const filtered = adminFilter==='all' ? adminOrders : adminOrders.filter(o=>o.status===adminFilter);
  const sClass = { new:'status-new', cooking:'status-cooking', ready:'status-ready', delivered:'status-delivered' };
  document.getElementById('ordersTable').innerHTML = filtered.length ? filtered.map(o => `
    <div class="order-row">
      <div class="order-id">${o.id}</div>
      <div>
        <div class="order-customer">${o.name}</div>
        <div class="order-items-list">${o.items}</div>
      </div>
      <div><span class="status-badge ${sClass[o.status]}" onclick="advanceStatus('${o.id}')" title="Click to advance">
        ${o.status==='new'?'🔴':o.status==='cooking'?'🔵':o.status==='ready'?'🟢':'✓'} ${t('status_'+o.status)}
      </span></div>
      <div class="order-total">${formatPrice(parseInt(o.total))}</div>
      <div class="order-time">${t(o.time)}</div>
    </div>`).join('')
    : `<div style="padding:2rem;text-align:center;color:#aaa">${t('no_orders')}</div>`;
}

function advanceStatus(id) {
  const next = { new:'cooking', cooking:'ready', ready:'delivered', delivered:'delivered' };
  const o = adminOrders.find(x=>x.id===id);
  if (o && o.status!=='delivered') { o.status = next[o.status]; renderAdmin(); showToast(t('toast_status') + ' ' + id); }
}

function filterOrders(f, el) {
  adminFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderOrdersTable();
}

// ===== NAV =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if (name==='menu') document.querySelectorAll('.nav-tab')[0].classList.add('active');
  else if (name==='admin') { document.querySelectorAll('.nav-tab')[1].classList.add('active'); renderAdmin(); }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ===== INIT =====
applyTranslations();
renderCatBar();
renderMenu();
updateCartUI();
</script>
</body>
</html>
